<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger Auto Bot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(99,102,241,0.3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    .body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #64748b;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .status-dot.streaming { background: #3b82f6; box-shadow: 0 0 6px #3b82f6; animation: pulse 1s infinite; }
    .status-dot.bot_running { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: pulse 0.8s infinite; }
    .status-dot.disconnected { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .status-text { flex: 1; }
    .status-label { font-weight: 500; font-size: 12px; }
    .status-sub { font-size: 10px; color: #64748b; margin-top: 1px; }

    .section { display: flex; flex-direction: column; gap: 6px; }
    .section label { font-size: 11px; color: #94a3b8; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 8px 10px;
      color: #e2e8f0;
      font-size: 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #6366f1; }
    input::placeholder { color: #475569; }

    .btn {
      padding: 9px 14px;
      border-radius: 7px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-primary {
      background: #6366f1;
      color: white;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .messenger-status {
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 11px;
      display: flex; align-items: center; gap: 6px;
    }
    .messenger-status.found {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #86efac;
    }
    .messenger-status.not-found {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.07); }

    .open-website {
      text-align: center;
      padding: 4px 0;
    }
    .open-website a {
      color: #818cf8;
      text-decoration: none;
      font-size: 11px;
    }
    .open-website a:hover { text-decoration: underline; }

    .version { text-align: center; color: #334155; font-size: 10px; padding-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🤖</div>
    <div>
      <h1>Messenger Auto Bot</h1>
      <p>Tự động gửi tin nhắn</p>
    </div>
  </div>

  <div class="body">
    <!-- Trạng thái kết nối -->
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text">
        <div class="status-label" id="statusLabel">Chưa kết nối</div>
        <div class="status-sub" id="statusSub">Nhập URL server để bắt đầu</div>
      </div>
    </div>

    <!-- Trạng thái tab Messenger -->
    <div id="messengerStatus" class="messenger-status not-found">
      <span>⚠️</span>
      <span id="messengerStatusText">Chưa tìm thấy tab Messenger</span>
    </div>

    <div class="divider"></div>

    <!-- Cấu hình server -->
    <div class="section">
      <label>URL Website</label>
      <input type="text" id="serverUrl" placeholder="https://your-site.manus.space" />
    </div>

    <div class="section">
      <label>Token kết nối</label>
      <input type="password" id="extensionToken" placeholder="Lấy từ trang Cài đặt" />
    </div>

    <div id="connectBtn" class="btn btn-primary">
      🔗 Kết nối với Website
    </div>

    <div id="disconnectBtn" class="btn btn-danger" style="display:none">
      ✕ Ngắt kết nối
    </div>

    <div class="divider"></div>

    <div class="open-website">
      <a id="openWebsite" href="#" target="_blank">🌐 Mở trang quản lý →</a>
    </div>

    <div class="version">v1.0.0 · Messenger Auto Bot</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
